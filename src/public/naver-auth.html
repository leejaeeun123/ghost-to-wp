<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>네이버 블로그 연결 — ANTIEGG 관리자</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      max-width: 540px; margin: 60px auto; padding: 0 20px;
      background: #fafbfc; color: #1a1a1a;
    }
    .card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 32px 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
    .status-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 8px; font-size: 14px;
      margin-bottom: 20px;
    }
    .status-row.ok { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .status-row.warn { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
    .status-row.ok .status-dot { background: #10b981; }
    .status-row.warn .status-dot { background: #f59e0b; }
    .btn-naver {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 14px 16px;
      background: #03c75a; color: #fff; border: 0; border-radius: 8px;
      font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
      cursor: pointer; text-decoration: none;
    }
    .btn-naver:hover { background: #02b452; }
    .btn-naver .n-mark {
      display: inline-block; width: 20px; height: 20px; margin-right: 10px;
      background: #fff; color: #03c75a; border-radius: 3px;
      font-weight: 800; font-size: 15px; line-height: 20px; text-align: center;
    }
    .meta { font-size: 13px; color: #6b7280; margin-top: 18px; line-height: 1.6; }
    .meta strong { color: #1a1a1a; }
    .btn-reauth {
      width: 100%; margin-top: 10px; padding: 10px; background: #f3f4f6;
      border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px;
      color: #374151; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>네이버 블로그 연결</h1>
    <div class="subtitle">ANTIEGG 블로그 자동 예약 발행을 위해 네이버 계정과 연결합니다.</div>

    <div id="status" class="status-row warn">
      <div class="status-dot"></div>
      <div id="status-text">연결 상태 확인 중...</div>
    </div>

    <a id="login-btn" class="btn-naver" href="/api/naver/auth/start">
      <span class="n-mark">N</span>
      <span>네이버로 로그인</span>
    </a>

    <div class="meta" id="meta" style="display:none">
      <div><strong>Access Token 만료까지</strong>: <span id="expires"></span></div>
      <div><strong>연결 시각</strong>: <span id="saved"></span></div>
      <button class="btn-reauth" onclick="location.href='/api/naver/auth/start'">재연결 (토큰 새로 받기)</button>
    </div>
  </div>

  <script>
    async function refresh() {
      try {
        const r = await fetch("/api/naver/status").then((r) => r.json())
        const statusEl = document.getElementById("status")
        const statusText = document.getElementById("status-text")
        const btn = document.getElementById("login-btn")
        const meta = document.getElementById("meta")
        if (r.exists) {
          statusEl.className = "status-row ok"
          statusText.textContent = "✓ 네이버 블로그 연결됨 (ANTIEGG 관리자 계정)"
          btn.style.display = "none"
          meta.style.display = "block"
          const sec = r.expiresInSec || 0
          const min = Math.floor(sec / 60)
          document.getElementById("expires").textContent = `약 ${min}분`
          document.getElementById("saved").textContent =
            new Date(r.savedAt).toLocaleString("ko-KR", { timeZone: "Asia/Seoul" })
        } else {
          statusEl.className = "status-row warn"
          statusText.textContent = "⚠ 연결 필요 — 아래 버튼으로 네이버 로그인을 진행해주세요"
          btn.style.display = "flex"
          meta.style.display = "none"
        }
      } catch (err) {
        document.getElementById("status-text").textContent = "상태 조회 실패: " + err.message
      }
    }
    refresh()
  </script>
</body>
</html>
