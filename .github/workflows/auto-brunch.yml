name: Auto Brunch 예약 (매주 토요일 KST 08:00 부근)

on:
  schedule:
    # UTC 금 23:00 (KST 토 08:00) — WP 자동 동기화(금) 다음날 한 번 실행.
    # 다가오는 월/화 19:00 발행분을 한 번에 모두 예약하므로 매일 돌릴 필요 없음.
    # GitHub Actions는 stateless라 .brunch-publish-state.json이 매번 비어 있어
    # 매일 cron 시 중복 예약 위험. 주 1회 실행으로 그 위험 회피.
    - cron: "0 23 * * 5"
  workflow_dispatch: # 수동 실행 — 즉시 예약 트리거 가능 (이번 주 즉시 처리용)

jobs:
  reserve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run brunch auto-reserve
        run: npx tsx src/scheduled-brunch.ts
        env:
          # WP/Notion — week-fetcher가 WP 아티클 + Notion 메타 enrichment 수행
          WP_API_URL: ${{ secrets.WP_API_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ARTICLE_DB_ID: ${{ secrets.NOTION_ARTICLE_DB_ID }}
          # Brunch 세션 — 만료 시 Notion 댓글로 갱신 안내 발송됨
          BRUNCH_COOKIE: ${{ secrets.BRUNCH_COOKIE }}
          BRUNCH_CSRF_TOKEN: ${{ secrets.BRUNCH_CSRF_TOKEN }}
